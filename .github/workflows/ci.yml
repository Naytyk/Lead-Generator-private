name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax-check JavaScript
        run: |
          for f in background.js content.js popup.js results.js; do
            echo "checking $f"
            node --check "$f"
          done

      - name: Validate manifest.json
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8')); console.log('manifest OK')"

      - name: Build (smoke test)
        run: bash build.sh

      - name: Upload packaged extension
        uses: actions/upload-artifact@v4
        with:
          name: share-lead-generator-zip
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30
