<!DOCTYPE html>
<html>
<head>
  <title>Leads Sent</title>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f7f6; margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; padding: 48px 56px; border-radius: 12px; text-align: center;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08); max-width: 420px;
    }
    .check {
      width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 50%;
      background: #218838; color: #fff; font-size: 40px; line-height: 72px; font-weight: bold;
    }
    h1 { margin: 0 0 8px; font-size: 22px; color: #1a1a1a; }
    #summary { margin: 0 0 20px; font-size: 15px; color: #555; }
    .sub { font-size: 13px; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">&#10003;</div>
    <h1>Leads sent</h1>
    <p id="summary">Your leads were dispatched to your sheet.</p>
    <p class="sub">You can close this tab.</p>
  </div>
  <script src="success.js"></script>
</body>
</html>
